name: Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version-alias: [ "stable", "oldstable" ]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Golang
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ matrix.go-version-alias }}
          cache: false

      - name: Compute build cache key
        id: build-cache-key
        run: |
          checksum=$(
            {
              cat go.mod
              [ -f go.sum ] && cat go.sum
              cat Makefile
              find . -type f -name '*.go' \
                -not -path './tools/*' \
                -print0 | sort -z | xargs -0 cat
            } | md5sum | awk '{print $1}'
          )
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Cache Go module cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/pkg/mod
          key: unit-test-go-mod-${{ runner.os }}-${{ hashFiles('go.sum') }}

      - name: Cache Go build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/go-build
          key: unit-test-go-build-${{ runner.os }}-${{ matrix.go-version-alias }}-${{ steps.build-cache-key.outputs.checksum }}
          restore-keys: |
            unit-test-go-build-${{ runner.os }}-${{ matrix.go-version-alias }}-

      - name: Run unit tests with coverage
        run: make test/unit/json

      - name: Publish unit test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Unit Tests
          path: build/unit-test-output.json
          reporter: golang-json
          fail-on-error: "false"

      - name: Generate coverage report
        if: always()
        run: |
          if [ -f build/coverage.out ]; then
            make coverage/report | grep "^### Code Coverage:" >> "$GITHUB_STEP_SUMMARY" || true
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage-report-${{ matrix.go-version-alias }}-${{ github.sha }}
          path: build/coverage.html
