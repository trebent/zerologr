name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "stable"
          cache: false

      - name: Compute build cache key
        id: build-cache-key
        run: echo "checksum=${{ hashFiles('go.mod', 'go.sum', 'tools/go.mod', 'tools/go.sum', '**/*.go') }}" >> "$GITHUB_OUTPUT"

      - name: Restore Go module cache
        id: module-cache
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('go.sum', 'tools/go.sum') }}

      - name: Restore Go build cache
        id: build-cache
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/go-build
          key: copilot-go-build-${{ runner.os }}-${{ steps.build-cache-key.outputs.checksum }}
          restore-keys: |
            copilot-go-build-${{ runner.os }}-

      - name: Download Go module dependencies
        run: |
          go mod download
          go mod download -modfile tools/go.mod

      - name: Install golangci-lint
        run: make install-lint

      - name: Warm up govulncheck
        run: go tool -modfile tools/go.mod govulncheck -version

      - name: Save Go module cache
        if: ${{ steps.module-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/go/pkg/mod
          key: ${{ steps.module-cache.outputs.cache-primary-key }}

      - name: Save Go build cache
        if: ${{ steps.build-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/go-build
          key: ${{ steps.build-cache.outputs.cache-primary-key }}
