name: Code scanning

run-name: Code scanning - ${{ github.event.pull_request.title || github.event.head_commit.message }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.0.2
        with:
          version: v2.11.2
          args: |
            --output.sarif.path golangci-lint-report.sarif

      - name: Upload linting SARIF
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: golangci-lint-report.sarif

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/go.mod
          cache: false

      - name: Compute build cache key
        id: build-cache-key
        run: |
          checksum=$(
            {
              cat tools/go.mod tools/go.sum Makefile
              find . -type f -name '*.go' \
                -not -path './tools/*' \
                -print0 | sort -z | xargs -0 cat
            } | md5sum | awk '{print $1}'
          )
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Restore Go module cache
        id: module-cache
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('tools/go.sum') }}

      - name: Restore Go build cache
        id: build-cache
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-tools-${{ steps.build-cache-key.outputs.checksum }}
          restore-keys: |
            ${{ runner.os }}-go-build-tools-

      - name: Run vulnerability scan
        run: make vulncheck-sarif

      - name: Upload vulnerability SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: build/govulncheck-report.sarif

      - name: Save Go module cache
        if: ${{ steps.module-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/go/pkg/mod
          key: ${{ steps.module-cache.outputs.cache-primary-key }}

      - name: Save Go build cache
        if: ${{ steps.build-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/go-build
          key: ${{ steps.build-cache.outputs.cache-primary-key }}
