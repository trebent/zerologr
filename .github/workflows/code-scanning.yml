name: "Code Scanning"

run-name: Code Scanning - ${{ github.event.pull_request.title || github.event.head_commit.message }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  # required to upload SARIF results to the Security tab
  security-events: write
  # required to fetch internal or private CodeQL packs
  packages: read
  # only required for workflows in private repositories
  actions: read
  contents: read

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          # golangci-lint-action manages its own cache
          cache: false

      - name: Create build directory
        run: mkdir -p build

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          args: --output-formats=colored-line-number,sarif:build/golangci-lint-report.sarif --issues-exit-code=0

      - name: Upload golangci-lint SARIF
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: build/golangci-lint-report.sarif
          category: golangci-lint

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/go.mod

      - name: Run govulncheck
        run: make vulncheck-sarif
        continue-on-error: true

      - name: Upload govulncheck SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: build/govulncheck-report.sarif
          category: govulncheck
